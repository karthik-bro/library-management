<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4"> Add Book</h2>

    <form method="POST" class="card p-4 shadow">
        <input type="text" name="title" class="form-control mb-3" placeholder="Book Title" required>
        <input type="text" name="author" class="form-control mb-3" placeholder="Author" required>

        <button type="submit" class="btn btn-success w-100">Add Book</button>
    </form>

    <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
    </div>
</div>

</body>
</html>
